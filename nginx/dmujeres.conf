# Configuración de Nginx para Dmujeres-Traccar
proxy_cache_path /var/cache/nginx/google_tiles levels=1:2 keys_zone=google_tiles_cache:10m max_size=5g inactive=30d use_temp_path=off;

server {
    listen 80;
    server_name 65.75.203.248; # IP of the VPS

    location / {
        root /home/Dmujeres-Traccar/frontend/build;
        try_files $uri $uri/ /index.html;
    }

    # Go API
    location /api/ {
        proxy_pass http://127.0.0.1:8082;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # GPS Ingestion
    location /ingest {
        proxy_pass http://127.0.0.1:8082/ingest;
    }

    # Google Tiles Path-based Proxy with local caching
    location /google-tiles/ {
        proxy_pass https://mt1.google.com/vt/;
        proxy_set_header Host mt1.google.com;
        
        # Spoof Chrome User-Agent to prevent Google from blocking requests
        proxy_set_header User-Agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36";
        
        proxy_cache google_tiles_cache;
        proxy_cache_valid 200 302 30d;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_pass_request_headers off;
        proxy_hide_header Set-Cookie;
        proxy_ignore_headers Set-Cookie Cache-Control Expires;
    }
}
