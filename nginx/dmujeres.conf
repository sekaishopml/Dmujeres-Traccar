# Configuración de Nginx para Dmujeres-Traccar
proxy_cache_path /var/cache/nginx/google_tiles levels=1:2 keys_zone=google_tiles_cache:50m max_size=10g inactive=60d use_temp_path=off;

server {
    listen 80;
    server_name 65.75.203.248; # IP of the VPS

    location / {
        root /home/Dmujeres-Traccar/frontend/build;
        try_files $uri $uri/ /index.html;
        
        # Cache static assets aggressively
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # Go API
    location /api/ {
        proxy_pass http://127.0.0.1:8082;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        
        # Disable caching for API
        proxy_cache off;
        proxy_set_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # GPS Ingestion
    location /ingest {
        proxy_pass http://127.0.0.1:8082/ingest;
    }

    # Google Tiles Path-based Proxy with local caching
    location /google-tiles/ {
        proxy_pass https://mt1.google.com/vt/;
        proxy_set_header Host mt1.google.com;
        
        # Spoof Chrome User-Agent to prevent Google from blocking requests
        proxy_set_header User-Agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36";
        
        # Optimized cache configuration
        proxy_cache google_tiles_cache;
        proxy_cache_valid 200 302 60d;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;
        proxy_cache_lock on;
        proxy_cache_lock_timeout 5s;
        
        # Performance optimizations
        proxy_buffering on;
        proxy_buffers 16 16k;
        proxy_busy_buffers_size 32k;
        
        # Pass-through important headers
        proxy_pass_request_headers off;
        proxy_hide_header Set-Cookie;
        proxy_ignore_headers Set-Cookie Cache-Control Expires;
        
        # Add cache status header for debugging
        add_header X-Cache-Status $upstream_cache_status;
    }
}

# Listen on default Traccar OsmAnd port 5055 and proxy to Go backend
server {
    listen 5055;
    server_name 65.75.203.248;

    location / {
        proxy_pass http://127.0.0.1:8082/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
